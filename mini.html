<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini PMS</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f6fa;
}

/* HEADER */
.header{
  background:#4a7bd0;
  color:#fff;
  text-align:center;
  padding:12px;
  font-size:18px;
  font-weight:bold;
}

/* DATE */
.date{
  background:#e8d9b5;
  text-align:center;
  padding:8px;
  font-weight:bold;
}

/* SECTION */
.section{
  margin-top:10px;
}

.section-title{
  text-align:center;
  padding:8px;
  font-weight:bold;
}

.checkin{ background:#cfe5d0; }
.checkout{ background:#e8bcbc; }
.stay{ background:#c9d6e5; }

/* TABLE */
.table{
  padding:10px;
}

.row{
  background:#fff;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.room{
  font-size:18px;
  font-weight:bold;
}

.name{
  color:#333;
}

.meta{
  font-size:12px;
  color:#666;
  margin-top:5px;
}

/* CHECKBOX */
.check-group{
  display:flex;
  gap:15px;
  margin-top:8px;
}

.check-group label{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">📱 Mini PMS</div>
<div class="date" id="today"></div>

<!-- CHECK-IN -->
<div class="section">
  <div class="section-title checkin">Check-in</div>
  <div id="checkinList" class="table"></div>
</div>

<!-- CHECK-OUT -->
<div class="section">
  <div class="section-title checkout">Check-out</div>
  <div id="checkoutList" class="table"></div>
</div>

<!-- STAY -->
<div class="section">
  <div class="section-title stay">Stay through</div>
  <div id="stayList" class="table"></div>
</div>
  
<script src="js/global.js"></script>
<script src="js/api.js"></script>

<script>
function formatDate(d){
  if(!d) return "-";
  return new Date(d).toLocaleDateString("th-TH");
}

function renderList(data, elId, type){

  const el = document.getElementById(elId);

  if(!data || data.length===0){
    el.innerHTML = "<div style='text-align:center;color:#999'>ไม่มีรายการ</div>";
    return;
  }

  let html = "";

  data.forEach(r => {

    html += `
    <div class="row">

      <div class="room">${r.room}</div>

      <div class="name">${r.name}</div>

      <div class="meta">
        ${formatDate(r.checkinDate)} → ${formatDate(r.checkoutDate)}
      </div>
    `;

    // 🔵 stay มี checkbox
    if(type==="stay"){
      html += `
      <div class="check-group">
        <label>
          <input type="checkbox" ${r.water ? "checked":""} disabled> water
        </label>

        <label>
          <input type="checkbox" ${r.tissue ? "checked":""} disabled> tissue
        </label>
      </div>
      `;
    }

    html += `</div>`;
  });

  el.innerHTML = html;
}

// ===== LOAD =====
async function load(){

  const d = await apiGet("getDashboard");

  if(!d){
    alert("โหลดไม่ได้");
    return;
  }

  document.getElementById("today").innerText =
    new Date().toLocaleDateString("th-TH");

  renderList(d.pendingCheckin, "checkinList", "checkin");
  renderList(d.pendingCheckout, "checkoutList", "checkout");
  renderList(d.stayList || [], "stayList", "stay");
}

load();
</script>

</body>
</html>
