<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:10px}

.row{display:flex;gap:20px;margin-bottom:15px}
.col{flex:1}

input,select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.readonly{
  padding:8px;
  background:#eee;
  border-radius:6px;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:flex-start;
}

.checkbox-item{
  display:flex;
  align-items:center;
  gap:6px;
}

.status-actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.green{background:#28a745;color:#fff}
.red{background:#dc3545;color:#fff}
.gray{background:#aaa;color:#fff}

.warning{color:#dc3545;font-size:13px}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;align-items:center">
  <h2>📋 Booking Detail</h2>
  <div>
    <button onclick="toggleEdit()">✏️ Edit</button>
    <button id="saveBtn" onclick="save()" style="display:none">💾 Save</button>
  </div>
</div>

<!-- READONLY -->
<div class="row">
  <div class="col">
    <label>Transaction ID</label>
    <div id="transactionId" class="readonly"></div>
  </div>
  <div class="col">
    <label>Channel</label>
    <div id="channel" class="readonly"></div>
  </div>
</div>

<!-- ROOM -->
<div class="row">
  <div class="col">
    <label>ประเภทห้อง</label>
    <select id="roomType"></select>
  </div>
  <div class="col">
    <label>หมายเลขห้อง</label>
    <select id="room" disabled></select>
    <div id="roomWarning" class="warning"></div>
  </div>
</div>

<input id="name" placeholder="ชื่อ">

<div class="row">
  <input id="checkin" type="date">
  <input id="checkout" type="date">
</div>

<label>หมายเหตุ</label>
<input id="note">

<!-- STATUS -->
<h3>💰 สถานะ</h3>

<div class="checkbox-group">
  <label class="checkbox-item">
    <input type="checkbox" id="deposit"> มัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="refund"> คืนมัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="water" disabled> วางน้ำ
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="tissue" disabled> วางทิชชู่
  </label>
</div>

<div class="status-actions">
  <button id="btnCheckin" class="btn green">Check-in</button>
  <button id="btnCheckout" class="btn gray">Check-out</button>
  <button id="btnCancel" class="btn red">Cancel</button>
</div>

<!-- FINANCE -->
<h3>💰 การเงิน</h3>
<div class="row">
  <input id="total" placeholder="ราคาสุทธิ">
  <select id="paymentType">
    <option value="">-- เลือก --</option>
    <option value="เงินสด">เงินสด</option>
    <option value="โอน">โอน</option>
  </select>
</div>

<div class="row">
  <div class="col">
    <label>เปลี่ยนผ้าปู</label>
    <input type="date" id="linenDate">
  </div>
  <div class="col">
    <label>ค่าเสียหาย</label>
    <input id="extra">
  </div>
</div>

</div>

<script src="js/global.js"></script>
<script src="js/api.js"></script>

<script>
let bookingId;
let originalData = {};
let allRooms = [];
let isEdit = false;

// ===== FORMAT DATE =====
function format(d){
  if(!d) return "";
  return new Date(d).toISOString().split("T")[0];
}

// ===== LOAD =====
async function load(){
  bookingId = new URLSearchParams(location.search).get("id");

  const d = await apiOne("getBookingDetail",{id:bookingId});
  if(!d) return;

  originalData = {...d};

  document.getElementById("transactionId").innerText = d.id || "";
  document.getElementById("channel").innerText = d.channel || "";

  document.getElementById("name").value = d.name || "";
  document.getElementById("checkin").value = format(d.checkin);
  document.getElementById("checkout").value = format(d.checkout);
  document.getElementById("note").value = d.note || "";

  document.getElementById("total").value = d.total || "";
  document.getElementById("paymentType").value = d.paymentType || "";

  document.getElementById("linenDate").value = format(d.linenDate);
  document.getElementById("extra").value = d.extra || "";

  document.getElementById("deposit").checked = !!d.deposit;
  document.getElementById("refund").checked = !!d.refund;

  await loadRoomTypes(d.type, d.room);

  updateButtons(d);
  toggleEdit(false);
}

// ===== ROOM =====
async function loadRoomTypes(selectedType, selectedRoom){
  allRooms = await apiList("getRooms");

  const types = [...new Set(allRooms.map(r=>r.type))];

  const roomType = document.getElementById("roomType");
  roomType.innerHTML = "<option value=''>-- เลือกประเภท --</option>";

  types.forEach(t=>{
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    roomType.appendChild(o);
  });

  roomType.value = selectedType || "";

  await loadRoomsByType(selectedRoom);
}

async function loadRoomsByType(selectedRoom){
  const type = document.getElementById("roomType").value;
  const room = document.getElementById("room");

  room.innerHTML = "<option value=''>-- เลือกห้อง --</option>";

  if(!type){
    room.disabled = true;
    return;
  }

  room.disabled = false;

  const available = await apiList("getAvailableRooms",{
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value
  });

  const rooms = allRooms.filter(r =>
    r.type === type &&
    (available.some(a=>a.room===r.room) || r.room===selectedRoom)
  );

  rooms.forEach(r=>{
    const o=document.createElement("option");
    o.value=r.room;
    o.textContent=r.room;
    room.appendChild(o);
  });

  // 🔥 FIX: set ค่าแน่นอน
  room.value = selectedRoom || "";
}

// ===== VALIDATE =====
async function validateRoom(){
  const available = await apiList("getAvailableRooms",{
    checkin: checkin.value,
    checkout: checkout.value
  });

  const ok = available.some(r=>r.room===room.value);
  document.getElementById("roomWarning").innerText = ok ? "" : "⚠ ห้องนี้ไม่ว่าง";
  return ok;
}

// ===== SAVE =====
async function save(){

  const ok = await validateRoom();
  if(!ok){
    alert("❌ ห้องนี้ไม่ว่าง");
    return;
  }

  const data = {
    ...originalData,

    room: document.getElementById("room").value,
    type: document.getElementById("roomType").value,
    name: document.getElementById("name").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value,
    note: document.getElementById("note").value,

    total: document.getElementById("total").value,
    paymentType: document.getElementById("paymentType").value,

    deposit: document.getElementById("deposit").checked,
    refund: document.getElementById("refund").checked,

    linenDate: document.getElementById("linenDate").value,
    extra: document.getElementById("extra").value
  };

  console.log("SAVE:", data);

  const res = await apiPost("updateBooking", data);

  if(res?.error){
    alert("❌ "+res.error);
    return;
  }

  alert("✅ บันทึกแล้ว");
  location.reload();
}

// ===== BUTTON =====
function updateButtons(d){
  if(!d.checkinStatus){
    document.getElementById("btnCheckout").disabled = true;
    document.getElementById("btnCancel").disabled = true;
  }
}

// ===== EDIT MODE =====
function toggleEdit(force){
  isEdit = force !== undefined ? force : !isEdit;

  document.querySelectorAll("input,select").forEach(el=>{
    el.disabled = !isEdit;
  });

  document.getElementById("water").disabled = true;
  document.getElementById("tissue").disabled = true;

  document.getElementById("saveBtn").style.display =
    isEdit ? "inline-block" : "none";
}

// ===== EVENT =====
document.getElementById("roomType").onchange = () => loadRoomsByType();
document.getElementById("room").onchange = validateRoom;
document.getElementById("checkin").onchange = () => loadRoomsByType(room.value);
document.getElementById("checkout").onchange = () => loadRoomsByType(room.value);

// ===== INIT =====
load();
</script>

</body>
</html>
