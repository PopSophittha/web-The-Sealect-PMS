<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f5f6fa;
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
}

.row {
  display:flex;
  gap:20px;
  margin-bottom:15px;
}

.col { flex:1; }

input, select {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.checkbox-group {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px 20px;
}

.checkbox-item {
  display:flex;
  align-items:center;
  gap:8px;
}

.actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save { background:#4CAF50; color:white; }
.edit { background:#2196F3; color:white; }
</style>
</head>

<body>

<div class="container">

<h2>📋 Booking Detail</h2>

<div class="row">
  <div class="col">
    <label>ห้อง</label>
    <select id="room"></select>
  </div>
  <div class="col">
    <label>จำนวน</label>
    <input id="people" type="number">
  </div>
</div>

<label>ชื่อ</label>
<input id="name">

<div class="row">
  <div class="col">
    <label>Check-in</label>
    <input id="checkin" type="date">
  </div>
  <div class="col">
    <label>Check-out</label>
    <input id="checkout" type="date">
  </div>
</div>

<label>หมายเหตุ</label>
<input id="note">

<h3>💰 สถานะ</h3>

<div class="checkbox-group">
  <div class="checkbox-item"><input type="checkbox" id="deposit"> มัดจำ</div>
  <div class="checkbox-item"><input type="checkbox" id="refund"> คืนมัดจำ</div>
  <div class="checkbox-item"><input type="checkbox" id="water" disabled> น้ำ</div>
  <div class="checkbox-item"><input type="checkbox" id="tissue" disabled> ทิชชู่</div>
</div>

<div class="row">
  <div class="col">
    <label>เปลี่ยนผ้าปู</label>
    <input type="date" id="linenDate">
  </div>
  <div class="col">
    <label>ค่าเสียหาย</label>
    <input type="text" id="extra">
  </div>
</div>

<div class="actions">
  <button class="edit" onclick="enableEdit()">✏️ Edit</button>
  <button class="save" onclick="save()">💾 Save</button>
</div>

</div>

<script src="js/api.js"></script>
<script src="js/global.js"></script>

<script>
let bookingId = null;

// ===== FORMAT DATE =====
function formatDate(d){
  if (!d) return "";
  const date = new Date(d);
  if (isNaN(date)) return "";
  return date.toISOString().split("T")[0];
}

// ===== SAFE SET VALUE =====
function setVal(id, value){
  const el = document.getElementById(id);
  if (!el) return;

  if (el.type === "checkbox") {
    el.checked = !!value;
  } else {
    el.value = value ?? "";
  }
}

// ===== DISABLE CONTROL =====
function setDisabled(state){
  const ids = [
    "room","people","name","checkin","checkout","note",
    "deposit","refund","water","tissue","linenDate","extra"
  ];

  ids.forEach(id=>{
    const el = document.getElementById(id);
    if (el) el.disabled = state;
  });
}

// ===== ENABLE EDIT =====
function enableEdit(){
  setDisabled(false);
}

// ===== LOAD ROOMS =====
async function loadAvailableRooms(selectedRoom = null) {
  const checkin = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;
  const select = document.getElementById("room");

  select.innerHTML = "<option value=''>-- เลือกห้อง --</option>";

  if (!checkin || !checkout) return;

  const rooms = await safeApi("getAvailableRooms", { checkin, checkout });

  if (!Array.isArray(rooms)) return;

  rooms.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.room;
    opt.textContent = r.room + " - " + r.type;
    select.appendChild(opt);
  });

  // ✅ set หลัง append เสมอ
  if (selectedRoom) {
    select.value = selectedRoom;
  }
}

// ===== LOAD DATA =====
async function load() {
  try {
    bookingId = new URLSearchParams(window.location.search).get("id");
    console.log("BOOKING ID:", bookingId);

    const d = await safeApi("getBookingDetail", { id: bookingId });
    console.log("DETAIL:", d);

    if (!d || d.error) {
      console.error("API ERROR:", d);
      alert("ไม่พบข้อมูล");
      return;
    }

    // set date ก่อน
    setVal("checkin", formatDate(d.checkin));
    setVal("checkout", formatDate(d.checkout));

    await loadAvailableRooms(d.room);
    
    // set values
    setVal("room", d.room);
    setVal("name", d.name);
    setVal("people", d.people);
    setVal("note", d.note);

    setVal("deposit", d.deposit);
    setVal("refund", d.refund);
    setVal("water", d.water);
    setVal("tissue", d.tissue);

    setVal("linenDate", formatDate(d.linenDate));
    setVal("extra", d.extra);

    // 🔒 lock form
    setDisabled(true);

  } catch (e) {
    console.error(e);
    alert("โหลดข้อมูลไม่สำเร็จ");
  }
}

// ===== EVENTS =====
const checkinEl = document.getElementById("checkin");
const checkoutEl = document.getElementById("checkout");

if (checkinEl && checkoutEl) {
  checkinEl.addEventListener("change", loadAvailableRooms);
  checkoutEl.addEventListener("change", loadAvailableRooms);
}

// ===== SAVE =====
async function save() {
  const data = {
    id: bookingId,
    room: document.getElementById("room").value,
    name: document.getElementById("name").value,
    people: document.getElementById("people").value,
    note: document.getElementById("note").value
  };

  await apiPost("updateBooking", data);
  alert("บันทึกแล้ว");
}

// ===== INIT =====
load();
</script>

</body>
</html>
