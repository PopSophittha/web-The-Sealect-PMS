<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:25px; border-radius:10px; }
.row { display:flex; gap:20px; margin-bottom:15px; }
.col { flex:1; }

input, select {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.checkbox-group {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px 20px;
}

.checkbox-item {
  display:flex;
  align-items:center;
  gap:8px;
}

.actions {
  margin-top:20px;
}

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save { background:#4CAF50; color:white; }
</style>
</head>

<body>

<div class="container">

<div style="display:flex; justify-content:space-between;">
  <h2>📋 Booking Detail</h2>
  <button id="editBtn" onclick="toggleEdit()">✏️ Edit</button>
</div>

<div class="row">
  <div class="col">
    <label>ห้อง</label>
    <select id="room"></select>
  </div>
  <div class="col">
    <label>จำนวน</label>
    <input id="people" type="number">
  </div>
</div>

<label>ชื่อ</label>
<input id="name">

<div class="row">
  <div class="col">
    <label>Check-in</label>
    <input id="checkin" type="date">
  </div>
  <div class="col">
    <label>Check-out</label>
    <input id="checkout" type="date">
  </div>
</div>

<label>หมายเหตุ</label>
<input id="note">

<h3>💰 สถานะ</h3>

<div class="checkbox-group">
  <label class="checkbox-item">
    <input type="checkbox" id="deposit"> มัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="refund"> คืนมัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="water" disabled> วางน้ำ
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="tissue" disabled> วางทิชชู่
  </label>
</div>

<div class="row">
  <div class="col">
    <label>เปลี่ยนผ้าปู</label>
    <input type="date" id="linenDate">
  </div>
  <div class="col">
    <label>ค่าเสียหาย</label>
    <input type="text" id="extra">
  </div>
</div>

<div class="actions">
  <button id="saveBtn" class="save" onclick="save()" style="display:none;">
    💾 Save
  </button>
</div>

</div>

<script src="js/global.js"></script>
<script src="js/api.js"></script>

<script>
let bookingId = null;
let isEdit = false;

function formatDate(d){
  if (!d) return "";
  return new Date(d).toISOString().split("T")[0];
}

// ===== LOAD ROOMS =====
async function loadAvailableRooms(selectedRoom = null) {
  const checkin = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;
  const select = document.getElementById("room");

  console.log("LOAD ROOMS WITH:", selectedRoom);

  select.innerHTML = "<option value=''>-- เลือกห้อง --</option>";

  if (!checkin || !checkout) return;

  const rooms = await safeApi("getAvailableRooms", { checkin, checkout });

  console.log("ROOM LIST:", rooms);

  if (!Array.isArray(rooms)) return;

  rooms.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.room;
    opt.textContent = `${r.room} - ${r.type}`;
    select.appendChild(opt);
  });

  // 🔥 fix ห้องเดิม
  if (selectedRoom && !rooms.some(r => r.room === selectedRoom)) {
    const opt = document.createElement("option");
    opt.value = selectedRoom;
    opt.textContent = `${selectedRoom} (เดิม)`;
    select.appendChild(opt);
  }

  // 🔥 set ค่า (ต้องอยู่ท้ายสุดเท่านั้น)
  select.value = selectedRoom || "";

  console.log("FINAL SELECT VALUE:", select.value);
}
  
// ===== LOAD =====
async function load() {
  bookingId = new URLSearchParams(window.location.search).get("id");

  const res = await safeApi("getBookingDetail", { id: bookingId });

  // 🔥 bookingDetail เป็น object อยู่แล้ว
  const d = Array.isArray(res) ? res[0] : res;
  
  if (!d) {
    alert("ไม่พบข้อมูล");
    return;
  }

  // set ค่า
  document.getElementById("name").value = d.name || "";
  document.getElementById("people").value = d.people || "";
  document.getElementById("note").value = d.note || "";

  document.getElementById("checkin").value = formatDate(d.checkin);
  document.getElementById("checkout").value = formatDate(d.checkout);

  // 🔥 สำคัญ: ส่ง room เข้าไปตอนโหลด
  await loadAvailableRooms(d.room);

  console.log("SET ROOM:", d.room);

  setViewMode();
}

// ===== MODE =====
function setViewMode() {
  document.querySelectorAll("input, select").forEach(el => el.disabled = true);
  document.getElementById("saveBtn").style.display = "none";
}

function toggleEdit() {
  isEdit = !isEdit;

  document.querySelectorAll("input, select").forEach(el => el.disabled = !isEdit);

  document.getElementById("water").disabled = true;
  document.getElementById("tissue").disabled = true;

  document.getElementById("saveBtn").style.display = isEdit ? "inline-block" : "none";
  document.getElementById("editBtn").innerText = isEdit ? "❌ Cancel" : "✏️ Edit";
}

// ===== SAVE =====
async function save() {
  const data = {
    id: bookingId,
    room: document.getElementById("room").value,
    name: document.getElementById("name").value
  };

  await apiPost("updateBooking", data);
  alert("บันทึกแล้ว");
  toggleEdit();
}

// ===== EVENTS =====
document.getElementById("checkin").addEventListener("change", () => {
  loadAvailableRooms(document.getElementById("room").value);
});

document.getElementById("checkout").addEventListener("change", () => {
  loadAvailableRooms(document.getElementById("room").value);
});
load();
</script>

</body>
</html>
