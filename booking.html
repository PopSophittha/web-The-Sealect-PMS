<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f5f6fa;
}

.container {
  max-width:900px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:10px;
}

h2 {
  margin-bottom:20px;
}

label {
  font-weight:bold;
  display:block;
  margin-bottom:5px;
}

input, select {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.row {
  display:flex;
  gap:20px;
  margin-bottom:15px;
}

.col {
  flex:1;
}

/* 🔥 checkbox layout */
.checkbox-group {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px 20px;
  margin-bottom:15px;
}

.checkbox-item {
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:normal;
}

/* section */
.section {
  margin-top:25px;
  padding-top:15px;
  border-top:1px solid #ddd;
}

/* buttons */
.actions {
  margin-top:25px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save { background:#4CAF50; color:white; }
.checkin { background:#4a7bd0; color:white; }
.checkout { background:#f39c12; color:white; }
.cancel { background:#e74c3c; color:white; }
</style>
</head>

<body>

<div class="container">
  <h2>📋 Booking Detail</h2>

  <!-- ===== BASIC ===== -->
  <div class="row">
    <div class="col">
      <label>เลขห้อง</label>
      <select id="room"></select>
    </div>

    <div class="col">
      <label>จำนวนเข้าพัก</label>
      <input id="people" type="number">
    </div>
  </div>

  <label>ชื่อลูกค้า</label>
  <input id="name">

  <div class="row">
    <div class="col">
      <label>Check-in</label>
      <input id="checkin" type="date">
    </div>

    <div class="col">
      <label>Check-out</label>
      <input id="checkout" type="date">
    </div>
  </div>

  <label>หมายเหตุ</label>
  <input id="note">

  <!-- ===== FINANCE ===== -->
  <div class="section">
    <h3>💰 การเงิน / แม่บ้าน</h3>

    <div class="checkbox-group">
      <label class="checkbox-item">
        <input type="checkbox" id="deposit"> มัดจำแล้ว
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="refund"> คืนมัดจำแล้ว
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="water" disabled> วางน้ำ
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="tissue" disabled> วางทิชชู่
      </label>
    </div>

    <div class="row">
      <div class="col">
        <label>วันที่เปลี่ยนผ้าปู</label>
        <input type="date" id="linenDate">
      </div>

      <div class="col">
        <label>ค่าอื่นๆ (ความเสียหาย)</label>
        <input type="text" id="extra">
      </div>
    </div>
  </div>

  <!-- ===== ACTION ===== -->
  <div class="actions">
    <button class="save" onclick="save()">💾 Save</button>
    <button class="checkin" onclick="checkin()">✅ Check-in</button>
    <button class="checkout" onclick="checkout()">📤 Check-out</button>
    <button class="cancel" onclick="cancel()">❌ Cancel</button>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/global.js"></script>

<script>
let bookingId = null;

// ===== FORMAT DATE =====
function formatDate(d){
  if (!d) return "";
  const date = new Date(d);
  return date.toISOString().split("T")[0];
}

// ===== LOAD ROOMS =====
async function loadAvailableRooms() {
  const checkin = document.getElementById("checkin").value;
  const checkout = document.getElementById("checkout").value;

  if (!checkin || !checkout) return;

  const rooms = await safeApi("getAvailableRooms", { checkin, checkout });

  if (!Array.isArray(rooms)) return;

  const select = document.getElementById("room");
  select.innerHTML = "";

  if (rooms.length === 0) {
    select.innerHTML = "<option>ไม่มีห้องว่าง</option>";
    return;
  }

  rooms.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r.room;
    opt.textContent = `${r.room} - ${r.type}`;
    select.appendChild(opt);
  });
}

// ===== LOAD =====
async function load() {
  bookingId = new URLSearchParams(window.location.search).get("id");

  if (!bookingId) {
    alert("ไม่พบ booking id");
    return;
  }

  const res = await safeApi("getBookingDetail", { id: bookingId });
  const d = Array.isArray(res) ? res[0] : res;
  
  if (!d || d.error) {
    alert(d.error);
    alert("ไม่พบข้อมูล");
    return;
  }

  // basic
  document.getElementById("name").value = d.name || "";
  document.getElementById("people").value = d.people || "";
  document.getElementById("note").value = d.note || "";

  // date
  document.getElementById("checkin").value = formatDate(d.checkin);
  document.getElementById("checkout").value = formatDate(d.checkout);

  // load rooms
  await loadAvailableRooms();

  if (d.room) {
    document.getElementById("room").value = d.room;
  }

  // finance
  document.getElementById("deposit").checked = d.deposit || false;
  document.getElementById("refund").checked = d.refund || false;

  document.getElementById("water").checked = d.water || false;
  document.getElementById("tissue").checked = d.tissue || false;

  document.getElementById("linenDate").value = formatDate(d.linenDate);
  document.getElementById("extra").value = d.extra || "";

  if (!d.checkoutStatus) {
    document.getElementById("refund").disabled = true;
  }

  console.log("deposit:", d.deposit);
console.log("water:", d.water);
}

// ===== SAVE =====
async function save() {
  const data = {
    id: bookingId,
    room: document.getElementById("room").value,
    name: document.getElementById("name").value,
    people: document.getElementById("people").value,
    checkin: document.getElementById("checkin").value,
    checkout: document.getElementById("checkout").value,
    note: document.getElementById("note").value,
    deposit: document.getElementById("deposit").checked,
    refund: document.getElementById("refund").checked,
    linenDate: document.getElementById("linenDate").value,
    extra: document.getElementById("extra").value
  };

  await apiPost("updateBooking", data);
  alert("บันทึกสำเร็จ");
}

// ===== ACTION =====
async function checkin() {
  await safeApi("updateStatus", { id: bookingId, type: "checkin" });
  alert("Check-in สำเร็จ");
  load();
}

async function checkout() {
  await safeApi("updateStatus", { id: bookingId, type: "checkout" });
  alert("Check-out สำเร็จ");
  load();
}

async function cancel() {
  if (!confirm("ยืนยันยกเลิก?")) return;

  await safeApi("updateStatus", { id: bookingId, type: "cancel" });
  alert("ยกเลิกแล้ว");
  load();
}

// ===== EVENTS =====
document.getElementById("checkin").addEventListener("change", loadAvailableRooms);
document.getElementById("checkout").addEventListener("change", loadAvailableRooms);

// ===== INIT =====
load();
</script>

</body>
</html>
