<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:10px}

.row{display:flex;gap:20px;margin-bottom:15px}
.col{flex:1}

.label{font-weight:bold;margin-bottom:5px}
.value{
  padding:8px;
  background:#f1f1f1;
  border-radius:6px;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.checkbox-item{
  display:flex;
  align-items:center;
  gap:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>📋 Booking Detail</h2>

<!-- BASIC -->
<div class="row">
  <div class="col">
    <div class="label">Transaction ID</div>
    <div id="id" class="value"></div>
  </div>
  <div class="col">
    <div class="label">Channel</div>
    <div id="channel" class="value"></div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="label">ห้อง</div>
    <div id="room" class="value"></div>
  </div>
  <div class="col">
    <div class="label">ประเภท</div>
    <div id="type" class="value"></div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="label">ชื่อ</div>
    <div id="name" class="value"></div>
  </div>
  <div class="col">
    <div class="label">จำนวนคน</div>
    <div id="people" class="value"></div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="label">Check-in</div>
    <div id="checkin" class="value"></div>
  </div>
  <div class="col">
    <div class="label">Check-out</div>
    <div id="checkout" class="value"></div>
  </div>
</div>

<div>
  <div class="label">หมายเหตุ</div>
  <div id="note" class="value"></div>
</div>

<!-- STATUS -->
<h3>💰 สถานะ</h3>

<div class="checkbox-group">
  <label class="checkbox-item">
    <input type="checkbox" id="deposit" disabled> มัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="refund" disabled> คืนมัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="water" disabled> วางน้ำ
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="tissue" disabled> วางทิชชู่
  </label>
</div>

<!-- FINANCE -->
<h3>💰 การเงิน</h3>

<div class="row">
  <div class="col">
    <div class="label">ราคาสุทธิ</div>
    <div id="total" class="value"></div>
  </div>
  <div class="col">
    <div class="label">ช่องทางชำระเงิน</div>
    <div id="paymentType" class="value"></div>
  </div>
</div>

<div class="row">
  <div class="col">
    <div class="label">เปลี่ยนผ้าปู</div>
    <div id="linenDate" class="value"></div>
  </div>
  <div class="col">
    <div class="label">ค่าเสียหาย</div>
    <div id="extra" class="value"></div>
  </div>
</div>

</div>

<script src="js/api.js"></script>

<script>
function format(d){
  if(!d) return "-";
  return new Date(d).toLocaleDateString("th-TH");
}

async function load(){
  const id = new URLSearchParams(location.search).get("id");

  const res = await apiGet("getBookingDetail",{id});
  const d = Array.isArray(res) ? res[0] : res;

  if(!d){
    alert("ไม่พบข้อมูล");
    return;
  }

  document.getElementById("id").innerText = d.id || "-";
  document.getElementById("channel").innerText = d.channel || "-";
  document.getElementById("room").innerText = d.room || "-";
  document.getElementById("type").innerText = d.type || "-";
  document.getElementById("name").innerText = d.name || "-";
  document.getElementById("people").innerText = d.people || "-";

  document.getElementById("checkin").innerText = format(d.checkin);
  document.getElementById("checkout").innerText = format(d.checkout);

  document.getElementById("note").innerText = d.note || "-";

  document.getElementById("total").innerText = d.total || "-";
  document.getElementById("paymentType").innerText = d.paymentType || "-";

  document.getElementById("linenDate").innerText = format(d.linenDate);
  document.getElementById("extra").innerText = d.extra || "-";

  document.getElementById("deposit").checked = !!d.deposit;
  document.getElementById("refund").checked = !!d.refund;
  document.getElementById("water").checked = !!d.water;
  document.getElementById("tissue").checked = !!d.tissue;
}

load();
</script>

</body>
</html>
