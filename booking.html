<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking Detail</title>

<style>
body{font-family:Arial;background:#f5f6fa;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:25px;border-radius:10px}

.row{display:flex;gap:20px;margin-bottom:15px}
.col{flex:1}

input,select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.readonly{
  padding:8px;
  background:#eee;
  border-radius:6px;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:flex-start;
}

.checkbox-item{
  display:flex;
  align-items:center;
  gap:6px;
}

.status-actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.green{background:#28a745;color:#fff}
.red{background:#dc3545;color:#fff}
.gray{background:#aaa;color:#fff}

.warning{color:#dc3545;font-size:13px}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;align-items:center">
  <h2>📋 Booking Detail</h2>
  <div>
    <button onclick="toggleEdit()">✏️ Edit</button>
    <button id="saveBtn" onclick="save()" style="display:none">💾 Save</button>
  </div>
</div>

<!-- READONLY -->
<div class="row">
  <div class="col">
    <label>Transaction ID</label>
    <div id="transactionId" class="readonly"></div>
  </div>
  <div class="col">
    <label>Channel</label>
    <div id="channel" class="readonly"></div>
  </div>
</div>

<!-- ROOM -->
<div class="row">
  <div class="col">
    <label>ประเภทห้อง</label>
    <select id="roomType"></select>
  </div>
  <div class="col">
    <label>หมายเลขห้อง</label>
    <select id="room" disabled></select>
    <div id="roomWarning" class="warning"></div>
  </div>
</div>

<input id="name" placeholder="ชื่อ">

<div class="row">
  <input id="checkin" type="date">
  <input id="checkout" type="date">
</div>

<label>หมายเหตุ</label>
<input id="note">

<!-- STATUS -->
<h3>💰 สถานะ</h3>

<div class="checkbox-group">
  <label class="checkbox-item">
    <input type="checkbox" id="deposit"> มัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="refund"> คืนมัดจำแล้ว
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="water" disabled> วางน้ำ
  </label>

  <label class="checkbox-item">
    <input type="checkbox" id="tissue" disabled> วางทิชชู่
  </label>
</div>

<div class="status-actions">
  <button id="btnCheckin" class="btn green">Check-in</button>
  <button id="btnCheckout" class="btn gray">Check-out</button>
  <button id="btnCancel" class="btn red">Cancel</button>
</div>

<!-- FINANCE -->
<h3>💰 การเงิน</h3>
<div class="row">
  <input id="total" placeholder="ราคาสุทธิ">
  <select id="paymentType">
    <option value="">-- เลือก --</option>
    <option value="เงินสด">เงินสด</option>
    <option value="โอน">โอน</option>
  </select>
</div>

<div class="row">
  <div class="col">
    <label>เปลี่ยนผ้าปู</label>
    <input type="date" id="linenDate">
  </div>
  <div class="col">
    <label>ค่าเสียหาย</label>
    <input id="extra">
  </div>
</div>

</div>

<script src="js/global.js"></script>
<script src="js/api.js"></script>

<script>
let bookingId;
let originalData;
let allRooms=[];
let isEdit=false;

// ===== LOAD =====
async function load(){
  bookingId = new URLSearchParams(location.search).get("id");

  const d = await apiOne("getBookingDetail",{id:bookingId});
  originalData = {...d};

  transactionId.innerText=d.id;
  channel.innerText=d.channel;

  name.value=d.name||"";
  checkin.value=format(d.checkin);
  checkout.value=format(d.checkout);
  note.value=d.note||"";

  total.value=d.total||"";
  paymentType.value=d.paymentType||"";

  linenDate.value=format(d.linenDate);
  extra.value=d.extra||"";

  deposit.checked=!!d.deposit;
  refund.checked=!!d.refund;

  await loadRoomTypes(d.type,d.room);

  updateButtons(d);

  // default view mode
  toggleEdit(false);
}

function format(d){
  if(!d) return "";
  return new Date(d).toISOString().split("T")[0];
}

// ===== ROOM =====
async function loadRoomTypes(selectedType,selectedRoom){
  allRooms = await apiList("getRooms");

  const types=[...new Set(allRooms.map(r=>r.type))];

  roomType.innerHTML="<option value=''>-- เลือกประเภท --</option>";

  types.forEach(t=>{
    const o=document.createElement("option");
    o.value=t;
    o.textContent=t;
    roomType.appendChild(o);
  });

  roomType.value=selectedType||"";

  await loadRoomsByType(selectedRoom);
}

async function loadRoomsByType(selectedRoom){
  const type=roomType.value;

  room.innerHTML="<option value=''>-- เลือกห้อง --</option>";

  if(!type){
    room.disabled=true;
    return;
  }

  room.disabled=false;

  const available = await apiList("getAvailableRooms",{
    checkin:checkin.value,
    checkout:checkout.value
  });

  const rooms = allRooms.filter(r =>
    r.type===type &&
    (available.some(a=>a.room===r.room) || r.room===selectedRoom)
  );

  rooms.forEach(r=>{
    const o=document.createElement("option");
    o.value=r.room;
    o.textContent=r.room;
    room.appendChild(o);
  });

  setTimeout(()=>{
    room.value = selectedRoom || "";
  },0);
}

// ===== VALIDATE =====
async function validateRoom(){
  const available = await apiList("getAvailableRooms",{
    checkin:checkin.value,
    checkout:checkout.value
  });

  const ok = available.some(r=>r.room===room.value);

  roomWarning.innerText = ok ? "" : "⚠ ห้องนี้ไม่ว่าง";

  return ok;
}

// ===== SAVE =====
async function save(){

  const ok = await validateRoom();
  if(!ok) return;

  const data={
    id:bookingId,
    room:room.value,
    type:roomType.value,
    name:name.value,
    checkin:checkin.value,
    checkout:checkout.value,
    note:note.value,
    total:total.value,
    paymentType:paymentType.value,
    deposit:deposit.checked,
    refund:refund.checked,
    linenDate:linenDate.value,
    extra:extra.value
  };

  const res = await apiPost("updateBooking",data);

  if(res?.error){
    alert("❌ "+res.error);
    return;
  }

  alert("✅ บันทึกแล้ว");
  toggleEdit(false);
}

// ===== BUTTON =====
function updateButtons(d){
  if(!d.checkinStatus){
    btnCheckout.disabled=true;
    btnCancel.disabled=true;
  }
}

// ===== EDIT MODE =====
function toggleEdit(force){
  if(force!==undefined){
    isEdit=force;
  }else{
    isEdit=!isEdit;
  }

  document.querySelectorAll("input,select").forEach(el=>{
    el.disabled=!isEdit;
  });

  water.disabled=true;
  tissue.disabled=true;

  saveBtn.style.display = isEdit ? "inline-block" : "none";
}

// ===== EVENT =====
roomType.onchange=()=>loadRoomsByType();
room.onchange=validateRoom;
checkin.onchange=()=>loadRoomsByType(room.value);
checkout.onchange=()=>loadRoomsByType(room.value);

// ===== INIT =====
load();
</script>

</body>
</html>
