<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { font-family: Arial; padding:20px; }

.header {
  background:#4a7bd0;
  color:white;
  padding:15px;
  font-size:24px;
}

.cards {
  display:flex;
  gap:20px;
  margin:20px 0;
}

.card {
  padding:15px;
  border-radius:10px;
  text-align:center;
  flex:1;
}

.green { background:#d4edda; }
.red { background:#f8d7da; }
.blue { background:#d1ecf1; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

.section {
  margin-top:20px;
}

.section h3 {
  padding:10px;
}

.checkin-header { background:#cfe5d0; }
.checkout-header { background:#e8bcbc; }
</style>
</head>

<body>

<div class="header">
  🏨 รายการเข้าพักประจำวัน
  <div id="today"></div>
</div>
  
<div class="cards">
  <div class="card green">Check-in<br><h2 id="c1"></h2></div>
  <div class="card red">Check-out<br><h2 id="c2"></h2></div>
  <div class="card blue">Stay<br><h2 id="c3"></h2></div>
  <div class="card">ว่าง<br><h2 id="c4"></h2></div>
  <div class="card">สำรอง<br><h2 id="c5"></h2></div>
</div>

<div class="section">
  <h3 class="checkin-header">ห้องพักที่ยังไม่ได้ Check-in</h3>
  <table id="checkinTable"></table>
</div>

<div class="section">
  <h3 class="checkout-header">ห้องพักที่ยังไม่ได้ Check-out</h3>
  <table id="checkoutTable"></table>
</div>

<script src="js/api.js"></script>
<script src="js/global.js"></script>
  
<script>
// ===== FORMAT DATE =====
function formatDate(d){
  const date = new Date(d);
  return date.toLocaleDateString("th-TH", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

// ===== RENDER TABLE =====
function renderTable(data, tableId){
  let html = `
  <tr>
    <th>ห้อง</th><th>ชื่อ</th><th>จำนวน</th>
    <th>เข้า</th><th>ออก</th><th>คืน</th>
    <th>จ่าย</th><th>หมายเหตุ</th>
  </tr>`;

  if (!data || data.length === 0) {
    html += `<tr><td colspan="8" style="color:#888">ไม่มีรายการ</td></tr>`;
  } else {
    data.forEach(r => {
      html += `
      <tr>
        <td>${r.room}</td>
        <td>${r.name}</td>
        <td>${r.people}</td>
        <td>${formatDate(r.checkinDate)}</td>
        <td>${formatDate(r.checkoutDate)}</td>
        <td>${r.nights}</td>
        <td>${r.payment || ""}</td>
        <td>${r.note || ""}</td>
      </tr>`;
    });
  }

  document.getElementById(tableId).innerHTML = html;
}

// ===== LOAD =====
async function load() {
  try {
    const d = await safeApi("getDashboard");

    if (!d) throw new Error("ไม่มีข้อมูลจาก API");

    // date
    document.getElementById("today").innerText =
      new Date().toLocaleDateString("th-TH");

    // cards
    document.getElementById("c1").innerText = d.checkin ?? 0;
    document.getElementById("c2").innerText = d.checkout ?? 0;
    document.getElementById("c3").innerText = d.stay ?? 0;
    document.getElementById("c4").innerText = d.available ?? 0;
    document.getElementById("c5").innerText = d.reservedRooms ?? 0;

    // tables
    renderTable(d.pendingCheckin, "checkinTable");
    renderTable(d.pendingCheckout, "checkoutTable");

  } catch (err) {
    console.error(err);
    alert("❌ โหลดข้อมูลไม่สำเร็จ\nลองรีเฟรชหน้าอีกครั้ง");
  }
}

// ===== INIT =====
load();

// 🔄 AUTO REFRESH ทุก 5 นาที
setInterval(load, 300000);
</script>

</body>
</html>
