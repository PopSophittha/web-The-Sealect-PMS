<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { font-family: Arial; padding:20px; }

.header {
  background:#4a7bd0;
  color:white;
  padding:15px;
  font-size:24px;
}

.cards {
  display:flex;
  gap:20px;
  margin:20px 0;
}

.card {
  padding:15px;
  border-radius:10px;
  text-align:center;
  flex:1;
}

.green { background:#d4edda; }
.red { background:#f8d7da; }
.blue { background:#d1ecf1; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

.section {
  margin-top:20px;
}

.section h3 {
  padding:10px;
}

.checkin-header { background:#cfe5d0; }
.checkout-header { background:#e8bcbc; }
</style>
</head>

<body>

<div class="header">🏨 รายการเข้าพักประจำวัน</div>

<div class="cards">
  <div class="card green">
    ห้องที่ Check-in<br><h2 id="c1">0</h2>
  </div>
  <div class="card red">
    ห้องที่ Check-out<br><h2 id="c2">0</h2>
  </div>
  <div class="card blue">
    จำนวนห้องที่อยู่ต่อ<br><h2 id="c3">0</h2>
  </div>
</div>

<div class="section">
  <h3 class="checkin-header">ห้องพักที่ยังไม่ได้ Check-in</h3>
  <table id="checkinTable"></table>
</div>

<div class="section">
  <h3 class="checkout-header">ห้องพักที่ยังไม่ได้ Check-out</h3>
  <table id="checkoutTable"></table>
</div>

<script src="js/api.js"></script>

<script>
function formatDate(d){
  return new Date(d).toLocaleDateString("th-TH");
}

async function load() {
  const d = await apiGet("getDashboard");

  // cards
  document.getElementById("c1").innerText = d.checkin;
  document.getElementById("c2").innerText = d.checkout;
  document.getElementById("c3").innerText = d.stay;

  // ===== CHECK-IN TABLE =====
  let htmlIn = `
  <tr>
    <th>เลขห้อง</th>
    <th>ชื่อ</th>
    <th>จำนวน</th>
    <th>check-in</th>
    <th>check-out</th>
    <th>คืน</th>
    <th>การชำระเงิน</th>
    <th>หมายเหตุ</th>
  </tr>`;

  d.pendingCheckin.forEach(r => {
    htmlIn += `
    <tr>
      <td>${r.room}</td>
      <td>${r.name}</td>
      <td>${r.people}</td>
      <td>${formatDate(r.checkinDate)}</td>
      <td>${formatDate(r.checkoutDate)}</td>
      <td>${r.nights}</td>
      <td>${r.payment || ""}</td>
      <td>${r.note || ""}</td>
    </tr>`;
  });

  document.getElementById("checkinTable").innerHTML = htmlIn;

  // ===== CHECK-OUT TABLE =====
  let htmlOut = htmlIn.replaceAll("checkinDate","checkoutDate");

  htmlOut = `
  <tr>
    <th>เลขห้อง</th>
    <th>ชื่อ</th>
    <th>จำนวน</th>
    <th>check-in</th>
    <th>check-out</th>
    <th>คืน</th>
    <th>การชำระเงิน</th>
    <th>หมายเหตุ</th>
  </tr>`;

  d.pendingCheckout.forEach(r => {
    htmlOut += `
    <tr>
      <td>${r.room}</td>
      <td>${r.name}</td>
      <td>${r.people}</td>
      <td>${formatDate(r.checkinDate)}</td>
      <td>${formatDate(r.checkoutDate)}</td>
      <td>${r.nights}</td>
      <td>${r.payment || ""}</td>
      <td>${r.note || ""}</td>
    </tr>`;
  });

  document.getElementById("checkoutTable").innerHTML = htmlOut;
}

load();
</script>

</body>
</html>
