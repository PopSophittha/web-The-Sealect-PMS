<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body { font-family: Arial; padding:20px; }

.header {
  background:#4a7bd0;
  color:white;
  padding:15px;
  font-size:24px;

  display:flex;
  justify-content:center;   /* จัดกลางแนวนอน */
  align-items:center;       /* จัดกลางแนวตั้ง */
  gap:10px;                 /* ระยะห่างข้อความ */
}

.cards {
  display:flex;
  gap:20px;
  margin:20px 0;
}

.card {
  padding:15px;
  border-radius:10px;
  text-align:center;
  flex:1;
}

.green { background:#d4edda; }
.red { background:#f8d7da; }
.blue { background:#d1ecf1; }

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

th, td {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

.section {
  margin-top:20px;
}

.section h3 {
  padding:10px;
}

.checkin-header { background:#cfe5d0;
  justify-content:center;   /* จัดกลางแนวนอน */
  align-items:center;       /* จัดกลางแนวตั้ง */ }
.checkout-header { background:#e8bcbc;
  justify-content:center;   /* จัดกลางแนวนอน */
  align-items:center;       /* จัดกลางแนวตั้ง */ }
  .menu-btn {
  position:absolute;
  left:15px;
  font-size:22px;
  cursor:pointer;
}

/* กันขอบขาว */
body {
  margin:0;
}

/* HEADER */
.header {
  position:relative;
  background:#4a7bd0;
  color:white;
  padding:15px;
  font-size:20px;
  text-align:center;
}

/* ปุ่มเมนู */
.menu-btn {
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  cursor:pointer;
}

/* SIDE MENU */
.side-menu {
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:#fff;
  transform:translateX(-100%);
  transition:0.3s ease;
  z-index:2000;
  padding:20px;
}

.side-menu.open {
  transform:translateX(0);
}

/* เมนู */
.side-menu a {
  display:block;
  padding:12px 0;
  color:#333;
  text-decoration:none;
  border-bottom:1px solid #eee;
  font-size:16px;
}

/* ปุ่มปิด */
.close-btn {
  font-size:22px;
  margin-bottom:10px;
  cursor:pointer;
}

/* OVERLAY */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:1500;
}

#overlay.show {
  display:block;
}

</style>
</head>
<div id="sideMenu" class="side-menu">
  <div class="close-btn" onclick="toggleMenu()">✕</div>

  <a href="index.html">📊 Dashboard</a>
  <a href="#" onclick="goPage('mini.html')">📱 Mini</a>
  <a href="booking.html">📋 Booking</a>
  <a href="#">🏨 Rooms</a>
  <a href="#">⚙️ Settings</a>
</div>

<div id="overlay" onclick="toggleMenu()"></div>
<body>
<th>version 1.0.25</th><br>
<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  🛌 รายการเข้าพักประจำวัน
  <div id="today"></div>
</div>
  
<div class="cards">
  <div class="card green">📍 Check-in<br><h2 id="c1"></h2></div>
  <div class="card red">📤 Check-out<br><h2 id="c2"></h2></div>
  <div class="card blue">🛌 Stay<br><h2 id="c3"></h2></div>
  <div class="card">✅ ห้องว่าง<br><h2 id="c4"></h2></div>
  <div class="card">🚪 ห้องสำรอง<br><h2 id="c5"></h2></div>
</div>

<div class="section">
  <h3 class="checkin-header">ห้องพักที่ยังไม่ได้ Check-in</h3>
  <table id="checkinTable"></table>
</div>

<div class="section">
  <h3 class="checkout-header">ห้องพักที่ยังไม่ได้ Check-out</h3>
  <table id="checkoutTable"></table>
</div>

<script src="js/global.js?v=3"></script>
<script src="js/api.js?v=3"></script>

<script>
  function toggleMenu(){
  const menu = document.getElementById("sideMenu");
  const overlay = document.getElementById("overlay");

  const isOpen = menu.classList.toggle("open");
  overlay.classList.toggle("show");

  // 🔥 กัน scroll ตอนเปิด
  document.body.style.overflow = isOpen ? "hidden" : "";
}
  
// ===== NAV =====
function goBooking(id){
  console.log("CLICK ID:", id);
  window.location.href = `booking.html?id=${id}`;
}

// ===== FORMAT DATE =====
function formatDate(d){
  if (!d) return "";
  const date = new Date(d);
  return date.toLocaleDateString("th-TH", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

// ===== TABLE =====
function renderTable(data, tableId){
  let html = `
  <tr>
    <th>เลขห้อง</th>
    <th>ชื่อลูกค้า</th>
    <th>จำนวน</th>
    <th>Check-in</th>
    <th>Check-out</th>
    <th>คืน</th>
    <th>ชำระเงิน</th>
    <th>หมายเหตุ</th>
  </tr>`;

  if (!data || data.length === 0) {
    html += `<tr><td colspan="8" style="color:#888">ไม่มีรายการ</td></tr>`;
  } else {
    data.forEach(r => {
      html += `
      <tr onclick="goBooking('${r.id}')" style="cursor:pointer">
        <td>${r.room || "-"}</td>
        <td>${r.name || "-"}</td>
        <td>${r.people || "-"}</td>
        <td>${formatDate(r.checkinDate)}</td>
        <td>${formatDate(r.checkoutDate)}</td>
        <td>${r.nights || "-"}</td>
        <td>${r.payment || "-"}</td>
        <td>${r.note || ""}</td>
      </tr>`;
    });
  }

  document.getElementById(tableId).innerHTML = html;
}

// ===== LOAD (ใช้ API ใหม่) =====
async function load() {
  showLoading();

  try {
    const d = await apiGet("getDashboard");

    console.log("DASHBOARD:", d);

    if (!d || d.error) {
      throw new Error(d?.error || "ไม่มีข้อมูล");
    }

    // ===== DATE =====
    document.getElementById("today").innerText =
      new Date().toLocaleDateString("th-TH");

    // ===== CARDS =====
    document.getElementById("c1").innerText = d.checkin ?? 0;
    document.getElementById("c2").innerText = d.checkout ?? 0;
    document.getElementById("c3").innerText = d.stay ?? 0;
    document.getElementById("c4").innerText = d.available ?? 0;
    document.getElementById("c5").innerText = d.reservedRooms ?? 0;

    // ===== TABLE =====
    renderTable(d.pendingCheckin, "checkinTable");
    renderTable(d.pendingCheckout, "checkoutTable");

  } catch (err) {
    console.error("❌ DASHBOARD ERROR:", err);
    alert("โหลด Dashboard ไม่สำเร็จ");
  } finally {
    hideLoading();
  }
}

// ===== INIT =====
load();

// 🔄 refresh ทุก 5 นาที
setInterval(load, 300000);
</script>
  
</body>
</html>
